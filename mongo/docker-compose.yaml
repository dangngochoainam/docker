services:
  mongo-keyfile:
    container_name: mongo-keyfile
    image: mongo:8.0
    command: >
      bash -c '
        if [ ! -f /keyfile/mongo.key ]; then
          openssl rand -base64 756 > /keyfile/mongo.key;
        fi;
        chmod 400 /keyfile/mongo.key;
        chown 999:999 /keyfile/mongo.key
      '
    volumes:
      - mongo_keyfile:/keyfile
    networks:
      - docker_stack
    restart: "no"

  mongo:
    container_name: mongo
    image: mongo:8.0
    command: ["--replSet", "rs0", "--keyFile", "/etc/mongo/mongo.key", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: Abc12345
    volumes:
      - mongo_data:/data/db
      - mongo_keyfile:/etc/mongo:ro
    ports:
      - 27018:27017
    networks:
      - docker_stack
    depends_on:
      mongo-keyfile:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "root", "-p", "Abc12345",
             "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mongo-init:
    container_name: mongo-init
    image: mongo:8.0
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - docker_stack
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongo:27017 -u root -p Abc12345 --authenticationDatabase admin --quiet --eval '
          try { rs.status() }
          catch (e) {
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo:27017" }] })
          }
        '

networks:
  docker_stack:
    external: true

volumes:
  mongo_data:
  mongo_keyfile:
