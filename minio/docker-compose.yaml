services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: Abc12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - docker_stack

networks:
  docker_stack:
    external: true

volumes:
  minio_data:


