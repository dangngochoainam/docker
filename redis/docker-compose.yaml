services:
  redis:
    container_name: redis
    image: redis:7.2
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - '6381:6379'
    networks:
      - docker_stack
    restart: unless-stopped

networks:
  docker_stack:
    external: true

volumes:
  redis_data: